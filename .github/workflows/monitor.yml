name: Emergency Line Monitor

# Scheduled provider monitor (M1 config + M3 deep E2E).
# A manual dispatch runs M1 only; it never runs M3.
on:
  schedule:
    # M1 ~every 30 min, offset OFF the congested :00/:30 slot.
    # Off-peak offsets can reduce scheduler contention, but scheduled runs can
    # still be delayed or dropped. Use an independent /health monitor too.
    # These offsets also deliberately differ from the original schedule. A
    # cron edit forces GitHub to refresh its internal schedule registration if
    # a newly created/rebuilt repository has an active workflow but emits no
    # `schedule` events.
    - cron: '11,41 * * * *'  # M1 ~every 30 min (off-peak offset)
    - cron: '23 */12 * * *'  # M3 deep E2E every 12h (away from :00 load)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: emergency-line-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check required secrets
        shell: bash
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
          TWILIO_API_SECRET: ${{ secrets.TWILIO_API_SECRET }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
        run: |
          missing=()
          for name in TWILIO_ACCOUNT_SID TWILIO_API_KEY TWILIO_API_SECRET TWILIO_AUTH_TOKEN FUNCTION_URL; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required repository secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - name: M1 config check
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
          TWILIO_API_SECRET: ${{ secrets.TWILIO_API_SECRET }}
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        run: node monitor/check-config.js
      - name: M3 deep E2E (12h tick only)
        if: github.event.schedule == '23 */12 * * *'
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
          TWILIO_API_SECRET: ${{ secrets.TWILIO_API_SECRET }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        run: node monitor/check-e2e.js --yes
